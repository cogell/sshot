name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        if: env.DEVELOPER_ID_P12 != ''
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$DEVELOPER_ID_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Archive
        run: |
          xcodebuild archive \
            -project SSHot.xcodeproj \
            -scheme SSHot \
            -configuration Release \
            -archivePath build/SSHot.xcarchive \
            -quiet \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}"

      - name: Export archive
        run: |
          cat > build/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/SSHot.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist \
            -quiet

      - name: Notarize
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create zip for notarization
          cd build/export
          zip -r -q ../../SSHot-notarize.zip SSHot.app
          cd ../..

          xcrun notarytool submit SSHot-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple build/export/SSHot.app

      - name: Create release zip
        id: zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="SSHot-${VERSION}.zip"
          cd build/export
          zip -r -q "../../${ZIP_NAME}" SSHot.app
          cd ../..
          SHA256=$(shasum -a 256 "$ZIP_NAME" | awk '{print $1}')
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.zip.outputs.zip_name }}" \
            --title "SSHot ${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Homebrew tap
        if: vars.HOMEBREW_TAP_REPO != ''
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.zip.outputs.sha256 }}"
          TAP_REPO="${{ vars.HOMEBREW_TAP_REPO }}"

          # Clone the tap repo, update the cask, push
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Casks/sshot.rb << EOF
          cask "sshot" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/cogell/sshot/releases/download/v#{version}/SSHot-#{version}.zip"
            name "SSHot"
            desc "Clipboard-to-SSH screenshot uploader for macOS"
            homepage "https://github.com/cogell/sshot"

            depends_on macos: ">= :sonoma"

            app "SSHot.app"

            zap trash: [
              "~/Library/Preferences/com.cogell.sshot.plist",
            ]
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/sshot.rb
          git commit -m "sshot ${VERSION}"
          git push
