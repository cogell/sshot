<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <!-- Screen frame: 31x24, centered in 36x36 (equal margins), rx=3 -->
  <rect x="2.5" y="6" width="31" height="24" rx="3"
        fill="none" stroke="black" stroke-width="2.5"/>
  <!-- > chevron: top=14, tip=18, bottom=22 — vertically centered in frame -->
  <polyline points="9,14 16,18 9,22"
            fill="none" stroke="black" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- _ cursor: baseline=22, aligned with bottom of chevron -->
  <line x1="18.5" y1="22" x2="27" y2="22"
        stroke="black" stroke-width="2.5" stroke-linecap="round"/>
</svg>
